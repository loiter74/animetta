<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anima 配置</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0f1a; color: #e0e0e0;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }
  .card {
    background: #1a1a2e; border-radius: 16px; padding: 40px;
    border: 1px solid rgba(255,255,255,0.08); max-width: 480px; width: 90%;
    text-align: center;
  }
  h1 { font-size: 24px; margin-bottom: 8px; }
  p { color: #888; margin-bottom: 24px; font-size: 14px; }
  .links { display: flex; flex-direction: column; gap: 12px; }
  .links a {
    display: block; padding: 12px 20px; border-radius: 10px;
    background: rgba(255,255,255,0.05); color: #e0e0e0;
    text-decoration: none; font-size: 14px; transition: background 0.2s;
  }
  .links a:hover { background: rgba(255,255,255,0.1); }
  .links a span { color: #666; font-size: 12px; display: block; margin-top: 4px; }
  .badge {
    display: inline-block; padding: 3px 8px; border-radius: 6px;
    font-size: 11px; margin-bottom: 16px;
  }
  .badge.online { background: rgba(74,222,128,0.15); color: #4ade80; }
</style>
</head>
<body>
<div class="card">
  <div class="badge online">● 服务运行中</div>
  <h1>Anima</h1>
  <p>AI 虚拟伴侣框架 — 服务已启动</p>
  <div class="links">
    <a href="http://localhost:12394/health">
      后端健康检查
      <span>http://localhost:12394/health</span>
    </a>
    <a href="http://localhost:12394/api/stats/overview">
      API 统计概览
      <span>http://localhost:12394/api/stats/overview</span>
    </a>
    <a href="http://localhost:3000">
      Vue 前端界面
      <span>需使用 --mode web 启动</span>
    </a>
  </div>
</div>
</body>
</html>
