<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' blob: data:; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:;">
  <title>Anima Live2D</title>
  <link rel="stylesheet" href="live2d.css">
</head>
<body>
  <div id="live2d-container">
    <canvas id="live2d-canvas"></canvas>
  </div>

  <!-- Live2D Cubism Core - must be loaded first (local copy) -->
  <script src="live2dcubismcore.min.js"></script>

  <!-- PIXI.js from node_modules -->
  <script src="../../node_modules/pixi.js/dist/browser/pixi.min.js"></script>

  <!-- pixi-live2d-display (cubism4 runtime) from node_modules -->
  <script src="../../node_modules/pixi-live2d-display/dist/cubism4.min.js"></script>

  <script>
    // Check if libraries loaded correctly
    console.log('[Live2D] Cubism Core loaded:', typeof Live2DCubismCore !== 'undefined');
    console.log('[Live2D] PIXI loaded:', typeof PIXI !== 'undefined');
    console.log('[Live2D] PIXI.live2d loaded:', typeof PIXI !== 'undefined' && typeof PIXI.live2d !== 'undefined');

    // Check for required libraries
    if (typeof Live2DCubismCore === 'undefined') {
      console.error('[Live2D] Live2DCubismCore not loaded!');
    }
    if (typeof PIXI === 'undefined') {
      console.error('[Live2D] PIXI not loaded!');
    } else if (typeof PIXI.live2d === 'undefined') {
      console.error('[Live2D] PIXI.live2d not loaded!');
    }
  </script>

  <script type="module" src="./index.js"></script>
</body>
</html>
