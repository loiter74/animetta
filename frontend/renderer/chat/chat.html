<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anima Chat</title>
  <link rel="stylesheet" href="chat.css">
</head>
<body>
  <div id="chat-app">
    <!-- Title bar -->
    <div id="title-bar">
      <div class="title-drag">
        <span class="title-text">Anima Chat</span>
      </div>
      <div class="title-controls">
        <button class="control-btn minimize" data-action="minimize">−</button>
        <button class="control-btn close" data-action="close">×</button>
      </div>
    </div>

    <!-- Connection status -->
    <div id="connection-status" class="status disconnected">
      <span class="status-dot"></span>
      <span class="status-text">Disconnected</span>
      <!-- Local LLM Style Transfer Toggle -->
      <div class="style-transfer-toggle">
        <label class="toggle-label">
          <span class="toggle-icon">🎭</span>
          <span class="toggle-text">风格迁移</span>
        </label>
        <input type="checkbox" id="style-transfer-switch" class="toggle-checkbox">
        <span class="toggle-status" id="style-transfer-status">OFF</span>
      </div>
      <!-- Memory Organize Button -->
      <button id="memory-organize-btn" class="memory-organize-btn" title="整理记忆">
        <span class="organize-icon">🧠</span>
        <span class="organize-text">记忆整理</span>
      </button>
    </div>

    <!-- Message list -->
    <div id="message-list" class="message-list">
      <div class="empty-state">
        <p>Start a conversation with Anima</p>
        <p class="hint">Type a message below or click the mic to speak</p>
      </div>
    </div>

    <!-- Input area -->
    <div id="input-area" class="input-area">
      <textarea
        id="message-input"
        class="message-input"
        placeholder="Type a message..."
        rows="1"
      ></textarea>
      <div class="input-actions">
        <button id="voice-btn" class="voice-btn" title="Voice input">
          <span class="mic-icon">🎤</span>
          <div class="volume-indicator" id="volume-indicator"></div>
        </button>
        <button id="send-btn" class="send-btn" title="Send message">
          <span class="send-icon">➤</span>
        </button>
      </div>
    </div>

    <!-- Speaking indicator -->
    <div id="speaking-indicator" class="speaking-indicator hidden">
      <div class="wave"></div>
      <div class="wave"></div>
      <div class="wave"></div>
    </div>
  </div>

  <script type="module" src="./index.js"></script>
</body>
</html>
