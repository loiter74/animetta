# ── Animetta Fly.io Deployment Configuration ────────────────────────────
# Deploy: flyctl launch --ha=false --generate-name
# Visit: https://your-app-name.fly.dev
#
# If "app name taken" error, use --generate-name to auto-generate

app = "animetta-demo"
primary_region = "hkg"

[build]
  dockerfile = "Dockerfile.cuda"

[http_service]
  internal_port = 12394
  force_https = true
  auto_stop_machines = "stop"    # Free tier: stop when idle
  auto_start_machines = true     # Start on first request
  min_machines_running = 0       # Scale to zero on free tier
  max_machines_running = 1

  [[http_service.ports]]
    handlers = ["http"]
    port = 80

  [[http_service.ports]]
    handlers = ["tls"]
    port = 443

  [[http_service.concurrency]]
    type = "requests"
    hard_limit = 25
    soft_limit = 10

[env]
  ANIMETTA_HOST = "0.0.0.0"
  ANIMETTA_PORT = "12394"
  ANIMETTA_LOG_LEVEL = "INFO"
  ANIMETTA_TTS = "kokoro"
  ANIMETTA_DEVICE = "cuda"
  PYTHONPATH = "/app/src"

[[mounts]]
  source = "animetta_data"
  destination = "/app/data"

[[mounts]]
  source = "animetta_memory_db"
  destination = "/app/memory_db"

# GPU machines (uncomment for GPU-accelerated TTS/ASR):
# [[vm]]
#   cpu_kind = "performance"
#   cpus = 2
#   memory_mb = 4096
#   gpu_kind = "a100-pcie-40gb"
#   gpus = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 2048
