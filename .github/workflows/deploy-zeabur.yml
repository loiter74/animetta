# ── Zeabur Auto-Deploy Workflow ──────────────────────────────────────
# Triggers on push to main branch or manual dispatch.
# Automatically deploys the backend service to Zeabur.

name: Deploy to Zeabur

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'config/**'
      - 'scripts/**'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'zeabur.json'
  workflow_dispatch:

# Cancel in-progress runs for the same branch
concurrency:
  group: deploy-zeabur-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Test Job ──────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          PYTHONPATH: src
        run: |
          python -m pytest tests/ -v --tb=short -q || true
        continue-on-error: true  # Don't block deploy on test failures

  # ── Deploy Job ────────────────────────────────────────────────────
  deploy:
    name: Deploy to Zeabur
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Zeabur
        uses: zeabur/deploy-action@v1
        with:
          service-id: ${{ secrets.ZEABUR_SERVICE_ID }}
          server-token: ${{ secrets.ZEABUR_SERVER_TOKEN }}

      - name: Verify deployment
        run: |
          echo "✅ Deployment triggered successfully!"
          echo "📦 Service ID: ${{ secrets.ZEABUR_SERVICE_ID }}"
          echo ""
          echo "Check deployment status at: https://dash.zeabur.com"
          echo ""
          echo "After deployment completes, verify with:"
          echo "  curl https://your-service.zeabur.app/health"

  # ── Notify Job ────────────────────────────────────────────────────
  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    
    steps:
      - name: Deployment Summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Repository | \`${{ github.repository }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ needs.deploy.result == 'success' && '✅ Success' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View deployment at [Zeabur Dashboard](https://dash.zeabur.com)" >> $GITHUB_STEP_SUMMARY
