# ── Alertmanager Configuration ──
# Routes alerts to Notifier service (Discord / Feishu / Email).
# Set NOTIFIER_* vars in .env.notifier.

route:
  receiver: "notifier-webhook"
  group_by: ["alertname"]
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h

receivers:
  - name: "notifier-webhook"
    webhook_configs:
      - url: "http://notifier:9094/api/v1/alerts"
        send_resolved: true
