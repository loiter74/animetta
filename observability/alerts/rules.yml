# ── Prometheus Alert Rules ──
# Evaluated by Prometheus every 15s (evaluation_interval in prometheus.yml)

groups:
  - name: animetta_alerts
    rules:
      # ── High LLM Error Rate (warning) ──
      - alert: AnimettaHighErrorRate
        expr: |
          (
            rate(animetta_llm_errors_total[5m])
            /
            rate(animetta_llm_request_duration_seconds_count[5m])
          ) > 0.05
        for: 5m
        labels:
          severity: warning
          component: llm
        annotations:
          summary: "Animetta LLM error rate > 5%"
          description: |
            LLM error rate is {{ $value | humanizePercentage }} over the last 5 minutes.
            Affected providers: check the "Animetta - Overview" dashboard.

      # ── High End-to-End Latency (warning) ──
      - alert: AnimettaHighLatency
        expr: |
          histogram_quantile(0.95,
            sum(rate(animetta_node_duration_seconds_bucket{node_name="output"}[5m])) by (le)
          ) > 10
        for: 5m
        labels:
          severity: warning
          component: pipeline
        annotations:
          summary: "Animetta p95 latency > 10s"
          description: |
            End-to-end p95 latency is {{ $value }}s over the last 5 minutes.
            Check the "Animetta - LangGraph Pipeline" dashboard for node breakdown.

      # ── Monthly Cost Budget Warning ──
      - alert: AnimettaCostBudgetWarning
        expr: |
          increase(animetta_llm_cost_usd_total[30d]) > 40
        labels:
          severity: warning
          component: cost
        annotations:
          summary: "Animetta monthly cost > $40"
          description: |
            Monthly LLM cost has exceeded $40 (current: {{ $value | humanize }}).
            Check the "Animetta - Cost & Tokens" dashboard for provider breakdown.

      # ── Monthly Cost Budget Critical ──
      - alert: AnimettaCostBudgetCritical
        expr: |
          increase(animetta_llm_cost_usd_total[30d]) > 48
        labels:
          severity: critical
          component: cost
        annotations:
          summary: "Animetta monthly cost > $48 (CRITICAL)"
          description: |
            Monthly LLM cost has exceeded $48 (current: {{ $value | humanize }}).
            This is the critical threshold. Review immediately.

      # ── Service Down (critical) ──
      - alert: AnimettaServiceDown
        expr: up{job="animetta"} == 0
        for: 2m
        labels:
          severity: critical
          component: service
        annotations:
          summary: "Animetta backend is DOWN"
          description: |
            Animetta backend ({{ $labels.instance }}) has been unreachable for 2 minutes.
            Check if the backend process is running.
