# ── OpenTelemetry Collector Configuration ──
# Receives OTLP data from Anima backend, exports traces to Tempo,
# and exposes Prometheus metrics endpoint for scraping.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 512
    timeout: 5s
  memory_limiter:
    check_interval: 1s
    limit_mib: 512

exporters:
  # Prometheus endpoint for metrics scraping
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: anima

  # Tempo OTLP trace backend
  otlp/tempo:
    endpoint: "tempo:4317"
    tls:
      insecure: true

  # Debug exporter (disable in production)
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/tempo, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus, debug]
