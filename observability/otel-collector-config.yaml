# ── OpenTelemetry Collector Configuration ──
# Receives OTLP data from Anima backend, exports traces to Tempo,
# metrics to Prometheus, and logs to Loki via filelog receiver.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  filelog:
    include: [/logs/anima.log]
    start_at: beginning
    include_file_name: false
    operators:
      - type: regex_parser
        regex: '^(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d{3}) \| (?P<level>\S+)\s*\| (?P<logger>\S+):(?P<message>.*)'

processors:
  batch:
    send_batch_size: 512
    timeout: 5s
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
  attributes/loki:
    actions:
      - key: app
        value: anima
        action: upsert

exporters:
  # Prometheus endpoint for metrics scraping
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: anima

  # Tempo OTLP trace backend
  otlp/tempo:
    endpoint: "tempo:4317"
    tls:
      insecure: true

  # Loki log exporter
  loki:
    endpoint: "http://loki:3100/loki/api/v1/push"

  # Debug exporter (disable in production)
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/tempo, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus, debug]
    logs:
      receivers: [filelog]
      processors: [batch, attributes/loki]
      exporters: [loki, debug]
