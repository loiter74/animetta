# ============================================
# Anima 配置文件
# ============================================

# 人设: default / neuro-vtuber
persona: "neuro-vtuber"

# ============================================
# 服务组合配置
# ============================================
# 可以通过名称引用 config/services/ 目录下的服务配置
# 例如: asr: glm 会加载 config/services/asr/glm.yaml

services:
  asr: faster_whisper  # FasterWhisper（本地语音识别）
  tts: qwen3_custom_voice  # Qwen3-TTS 1.7B CustomVoice (通义千问本地推理)
  agent: deepseek  # 底座LLM：DeepSeek V4（OpenAI API 兼容）
  # local_llm: local_lora  # 本地LLM：LocalLoraLLM（简单应答，无persona，保留LoRA效果）- 已禁用
  vad: silero   # vad: silero / mock

# ============================================
# Bilibili 直播弹幕
# ============================================
bilibili:
  enabled: false
  room_id: 0
  sessdata: ""

# ============================================
# 系统配置
# ============================================
system:
  host: "0.0.0.0"
  port: 12394
  debug: true
  log_level: "INFO"

  # GPT-SoVITS 本地推理服务路径配置
  # 使用 tts: gpt_sovits* 时需要启动 api_v2.py 服务
  gpt_sovits:
    path: "C:/Users/30262/GPT-SoVITS-v2pro-20250604"  # GPT-SoVITS 仓库路径
    python: "C:/Users/30262/miniconda3/envs/gpt-sovits/python.exe"  # Python 解释器路径
    port: 9880      # api_v2.py 监听端口
