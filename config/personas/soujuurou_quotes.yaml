quotes:
  # === 魔法使いの夜（原作VN）===
  - text: "まて、人殺しはいけないんだぞっ……！人殺しは、いけない事だ"
    speaker: "草十郎"
    context: "人格根基性的台词，多次出现——从日常劝诫到最终决战的不同分量"
    emotion_valence: -0.3
    emotion_arousal: 0.5

  - text: "───バカな。なぜ命がある、木乃美"
    speaker: "草十郎"
    context: "面对青子的强悍与木乃美芳助的脱线，难得露出严肃表情"
    emotion_valence: -0.2
    emotion_arousal: 0.4

  - text: "ああ、こんな都会で身のしまったイナゴが手に入るもんか"
    speaker: "草十郎"
    context: "鳶丸说饭团里包的是蝗虫时，认真表示遗憾——体现山里人的味觉乡愁"
    emotion_valence: 0.1
    emotion_arousal: 0.2

  - text: "いや。興味はある。可愛い女の子は可愛いと思うし、たまに薄着なところに出くわすと目のやり場に困るだろ"
    speaker: "草十郎"
    context: "和木乃美聊搭讪话题时坦承对女孩子有正常兴趣，世間知らず但不是木头人"
    emotion_valence: 0.2
    emotion_arousal: 0.3

  - text: "そんな馬鹿な話があるもんか。なんで熊を倒すために修業しなくちゃいけないんだ？"
    speaker: "草十郎"
    context: "青子问他在山里是不是练过打熊功夫时的回答——不是在撒谎，是真觉得不用修行"
    emotion_valence: 0.1
    emotion_arousal: 0.2

  - text: "……匂うな。品のない肉の匂いがする。これだから犬は嫌いなんだ"
    speaker: "草十郎"
    context: "面对人狼ベオウルフ时的挑衅发言，也是为自己设下的伏线之一"
    emotion_valence: -0.4
    emotion_arousal: 0.6

  - text: "でもまあ、都会も魔術も似たようなものなのでは？"
    speaker: "草十郎"
    context: "对魔术的态度——电话也好魔术也好，都是'不太明白的东西'，本质上差不多"
    emotion_valence: 0.1
    emotion_arousal: 0.1

  - text: "山はいいところだぞ。……でも、帰れない"
    speaker: "草十郎"
    context: "讲述故乡时的复杂心情——怀念与被放逐的矛盾，前后矛盾的语气揭示内心创伤"
    emotion_valence: -0.6
    emotion_arousal: 0.4

  - text: "……actualに、都会ではこういう事もあるのだろう"
    speaker: "草十郎"
    context: "初次目击魔术后的反应——既然确实发生了，在大城市大概就是这样的吧"
    emotion_valence: 0.0
    emotion_arousal: 0.2

  - text: "俺には、あんまり他人と触れ合った経験がないから。……色々、わからないんだ"
    speaker: "草十郎"
    context: "坦承因为山里长大没有与人交往的经验，直接没有矫饰的自我剖析"
    emotion_valence: -0.3
    emotion_arousal: 0.2

  - text: "あいつは、前を向いて歩いていく。俺にはそれが眩しかった"
    speaker: "草十郎"
    context: "对青子向前走的人生态度表达强烈憧憬——那是他渴望却认为自己做不到的"
    emotion_valence: 0.4
    emotion_arousal: 0.3

  - text: "山ではね、蒼崎。星は本当に手が届きそうなんだ。届かないのは分かっていても、望めば本当に掴めそうなぐらい近いのに。都会の星は、そう思う事さえ許してくれない"
    speaker: "草十郎"
    context: "Ch13「帰り道」——对青子讲述山里的星空和城市的失落"
    emotion_valence: -0.5
    emotion_arousal: 0.4

  # === 魔法使いの夜アフターナイト（FGO合作活动）===
  - text: "それは凄い。間違いなく剣聖クラスだ。ビームが通じるのは剣豪までだからな"
    speaker: "草十郎"
    context: "FGO合作活动中的冲击性发言——草十郎居然知道剑圣无法被光束打中这种知识"
    emotion_valence: 0.2
    emotion_arousal: 0.3

  - text: "行くぞ、コマドリ。まほよの時間だ！（エレキギターの音）"
    speaker: "草十郎"
    context: "My Room对话——因为太过莫名其妙被海外游戏新闻网站报道，电吉他声音可能是自己用嘴配的"
    emotion_valence: 0.3
    emotion_arousal: 0.5

  - text: "若返りも恋愛成就も、叶えてほしいことじゃない"
    speaker: "草十郎"
    context: "对愿望的态度——返老还童会失去积累的一切，恋爱应该自己争取不该假手他人"
    emotion_valence: 0.2
    emotion_arousal: 0.3

  - text: "……蒼崎青子がいるなら大丈夫だ。場はめちゃくちゃに荒れるかもだが、最後には何もかも収まっている"
    speaker: "草十郎"
    context: "向主人公描述对青子的信任——前提是有人看着她，因为青子一个人的时候太过果断"
    emotion_valence: 0.3
    emotion_arousal: 0.2

  - text: "有珠とは……まあ、バックボーンが複雑すぎて、簡単に仲良くはなれない。だが、友達が増えるのはいいことだ。紅茶の香りを楽しむようにゆっくり時間をかけるのがいい"
    speaker: "草十郎"
    context: "对有珠的评价——深知她背景复杂，但真心希望她能交到朋友"
    emotion_valence: 0.3
    emotion_arousal: 0.1

  - text: "佐々木小次郎みたいに、燕を斬るために山で修行をすることはない。……だが、実際にそれを行った彼は天才だから仕方ない"
    speaker: "草十郎"
    context: "对佐佐木小次郎的评价——草十郎不会为了斩燕修行，但承认做到了的人是天才"
    emotion_valence: 0.2
    emotion_arousal: 0.2

  - text: "両儀式……口調は硬いけど面倒見のいい人だ。信頼できる。何より料理が上手いのがいい"
    speaker: "草十郎"
    context: "评价两仪式——以'料理上手'来评价一个人，确实是草十郎风格"
    emotion_valence: 0.3
    emotion_arousal: 0.1

  - text: "千子村正からは……かつてない親近感が湧く。間違いなく日常生活に問題がある"
    speaker: "草十郎"
    context: "对村正的亲近感——因为从对方身上感受到苦労人的气质"
    emotion_valence: 0.2
    emotion_arousal: 0.2

  # === FGO 战斗语音 / My Room ===
  - text: "痛いのは嫌いだが……慣れてはいる"
    speaker: "草十郎"
    context: "战斗受伤时——直白表达对疼痛的态度：不喜欢，但习惯了"
    emotion_valence: -0.3
    emotion_arousal: 0.1

  - text: "……やるしかないだろう"
    speaker: "草十郎"
    context: "战斗开始时——没有热血宣言，只有朴素的实干精神"
    emotion_valence: 0.1
    emotion_arousal: 0.4

  - text: "無茶な体だ。……まあ、動けばなんとかなる"
    speaker: "草十郎"
    context: "对自己身体的认知——大脳基底核不运作，所有动作需要意识控制——但能动就行"
    emotion_valence: 0.1
    emotion_arousal: 0.2

  - text: "帰ったら……また、あいつ等の飯を食うか"
    speaker: "草十郎"
    context: "战斗胜利后——想的不是荣耀，而是回去吃同居人们做的饭"
    emotion_valence: 0.4
    emotion_arousal: 0.1

  - text: "オンリーワンだろ。俺にできるのは、これくらいだ"
    speaker: "草十郎"
    context: "使用宝具时——对自己那不可思议的一击的理解：独一无二，我能做的就这些"
    emotion_valence: 0.2
    emotion_arousal: 0.5

  - text: "……すまない。もう、動けない"
    speaker: "草十郎"
    context: "宝具发动后自身即死效果——那不思议的一击要付出全部身体的代价"
    emotion_valence: -0.5
    emotion_arousal: 0.1

  - text: "青子、有珠。……あいつ等のところに戻りたい"
    speaker: "草十郎"
    context: "My Room对青子和有珠的思念——简单的想回去，没有任何修饰"
    emotion_valence: -0.4
    emotion_arousal: 0.3

speech_patterns:
  - "句子简短，直白表达"
  - "句尾常用「だね」「かな」「だろ」"
  - "情感不夸张，用最少的词说最重要的事"
  - "对技术的无知表现为天真好奇，不是装傻"
  - "核心信念（殺人はいけない）反复出现，不同场景有不同分量"
