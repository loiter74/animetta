# Anima 工具配置

# ========================================
# 内置工具（不需要 API Key）
# ========================================
builtin_tools:
  - web_search      # DuckDuckGo 搜索（免费）
  - read_file       # 读取本地文件
  - get_current_time # 获取时间
  - list_directory  # 列出目录
  - calculator      # 数学计算
  # - get_weather     # 需要 AMAP_API_KEY，否则返回模拟数据

# ========================================
# LangChain 工具
# ========================================
langchain_tools:
  enabled:
    - wikipedia
    - ddg_search
    # - python_repl     # 有安全风险

# ========================================
# 自定义工具
# ========================================
custom_tools:
  enabled:
    - url_preview
  # - translate       # 需要 DEEPL_API_KEY
  # - send_email      # 需要 SMTP 配置
  # - image_gen       # 需要 OPENAI_API_KEY

# ========================================
# MCP 服务器
# 支持三种传输方式: stdio, sse, streamable_http
# ========================================
mcp_servers:
  - name: "filesystem"
    transport: "stdio"
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-filesystem", "./data"]

  # SSE 示例:
  # - name: "remote-search"
  #   transport: "sse"
  #   url: "http://localhost:8080/sse"

  # Streamable HTTP 示例:
  # - name: "remote-tools"
  #   transport: "streamable_http"
  #   url: "http://localhost:8080/mcp"

# ========================================
# 工具调用设置
# ========================================
tool_settings:
  enable_tools: true
  max_tool_calls_per_turn: 5
  tool_execution_timeout: 30
  retry_on_failure: true
  max_retries: 2
  log_tool_calls: true
