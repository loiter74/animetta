# Anima 工具配置

# ========================================
# 内置工具（不需要 API Key）
# ========================================
builtin_tools:
  - web_search      # Tavily + DuckDuckGo 双 fallback 搜索
  - get_current_time # 获取时间
  - calculator      # 数学计算
  # - get_weather     # 需要 AMAP_API_KEY，否则返回模拟数据
  # - read_file       # 已由 MCP filesystem 替代，更安全
  # - list_directory  # 已由 MCP filesystem 替代，更安全

# ========================================
# LangChain 工具
# ========================================
langchain_tools:
  enabled: []
    # - python_repl     # 有安全风险，按需启用
    # - wikipedia       # 与 web_search 功能重叠
    # - ddg_search      # 与 web_search 的 fallback 重复

# ========================================
# 自定义工具
# ========================================
custom_tools:
  enabled: []
  # - url_preview     # 按需启用
  # - translate       # LLM 自身多语言能力足够
  # - send_email      # 需要 SMTP 配置
  # - image_gen       # 需要 OPENAI_API_KEY

# ========================================
# MCP 服务器
# 支持三种传输方式: stdio, sse, streamable_http
# ========================================
mcp_servers:
  - name: "filesystem"
    transport: "stdio"
    sandbox:
      type: "docker"
      image: "anima-mcp-filesystem"
      mounts:
        - "./data:/data:rw"
      memory: "128m"
      cpus: "0.5"
    args: ["/data"]  # ENTRYPOINT 参数，容器内的允许目录

  # SSE 示例:
  # - name: "remote-search"
  #   transport: "sse"
  #   url: "http://localhost:8080/sse"

  # Streamable HTTP 示例:
  # - name: "remote-tools"
  #   transport: "streamable_http"
  #   url: "http://localhost:8080/mcp"

# ========================================
# 工具调用设置
# ========================================
tool_settings:
  enable_tools: true
  max_tool_calls_per_turn: 5
  tool_execution_timeout: 30
  retry_on_failure: true
  max_retries: 2
  log_tool_calls: true
