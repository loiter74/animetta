# Anima 唱歌模块配置
singing:
  gpt_sovits:
    base_url: "http://127.0.0.1:9880"
    svc_endpoint: "/svc"
    ref_audio_path: ""
    prompt_text: ""
    text_lang: "zh"
    top_k: 15
    top_p: 1.0
    temperature: 1.0
    speed: 1.0
  # RVC voice conversion (local)
  rvc:
    enabled: true                      # enable RVC voice conversion
    rvc_path: "C:/Users/30262/RVC20240604Nvidia"
    python_exe: ""                     # auto-detect from runtime/python.exe
    model_name: "sanyueqi.pth"         # voice model file
    index_path: ""                     # no feature index for sanyueqi
    f0_method: "rmvpe"                # pitch extraction: rmvpe | pm | harvest | crepe
    f0_up_key: 0                      # semitone shift (-12 to +12)
    index_rate: 0                      # disable timbre blend (no index)
    filter_radius: 3
    rms_mix_rate: 0.25
    protect: 0.33
  bilibili:
    downloader: "yt-dlp"
    output_dir: "./data/singing/downloads"
  separation:
    engine: "demucs"     # demucs | uvr
    model: "htdemucs"    # htdemucs | UVR-MDX-NET-Inst_HQ_3
    output_dir: "./data/singing/separated"
  asr:
    model_size: "base"
    language: "zh"
    output_dir: "./data/singing/lyrics"
  svc:
    output_dir: "./data/singing/converted"
  output_dir: "./data/singing/outputs"
  max_file_age_days: 7
