# Animetta 唱歌模块配置
# 唱歌模块使用独立的人物模型和音频处理管线，与主服务配置(services.yaml)分离。
# singing.yaml 的 rvc/separation 配置用于歌曲转换和伴奏分离，
# 而 services.yaml 的 vc/separation 用于实时对话的声音转换。
singing:
  asr:
    download_root: E:/animetta_data/models/whisper
    language: null
    model_size: large-v3
    output_dir: ./data/singing/lyrics
  bilibili:
    downloader: yt-dlp
    output_dir: ./data/singing/downloads
  gpt_sovits:
    base_url: http://127.0.0.1:9880
    prompt_text: ''
    ref_audio_path: ''
    speed: 1.0
    svc_endpoint: /svc
    temperature: 1.0
    text_lang: zh
    top_k: 15
    top_p: 1.0
  max_file_age_days: 7
  output_dir: ./data/singing/outputs
  rvc:
    enabled: true
    f0_method: rmvpe
    f0_up_key: 0
    filter_radius: 5
    index_path: logs/shige_utage.index
    index_rate: 0.6
    model_name: shige_utage.pth
    protect: 0.5
    python_exe: ''
    rms_mix_rate: 0.5
    rvc_path: ${RVC_PATH:}
  separation:
    engine: demucs
    model: htdemucs
    output_dir: ./data/singing/separated
  svc:
    output_dir: ./data/singing/converted
