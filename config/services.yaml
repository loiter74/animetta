# Animetta 服务配置注册表
# 每项对应 config/config.yaml 中 services.* 的选择值
# 如需切换服务，修改 config.yaml 中的服务名，无需改此文件
# 更多服务示例见 config/services-examples.yaml

asr:
  mock:
    type: mock

tts:
  kusajuro_vc:
    type: qwen3
    model: /root/.cache/huggingface/hub/models--Qwen--Qwen3-TTS-12Hz-0.6B-Base/snapshots/5d83992436eae1d760afd27aff78a71d676296fc
    speaker: custom
    device: cuda
    dtype: bfloat16
    language: Chinese
    use_flash_attn: false
    max_new_tokens: 2048
    ref_audio_path: config/personas/voices/kusajuro_ref.wav
    ref_text: ''
    x_vector_only: true
  edge:
    type: edge
    voice: zh-CN-XiaoxiaoNeural
  mock:
    type: mock

llm:
  deepseek:
    memory_enabled: true
    llm_config:
      type: deepseek
      api_key: ${DEEPSEEK_API_KEY}
      model: deepseek-v4-flash
      base_url: https://api.deepseek.com/v1
      temperature: 0.7
      max_tokens: 4096
  mock:
    memory_enabled: false
    llm_config:
      type: mock

vad:
  silero:
    type: silero
    sample_rate: 16000
    prob_threshold: 0.15
    db_threshold: -100
    required_hits: 2
    required_misses: 16
    smoothing_window: 5
  mock:
    type: mock
    sample_rate: 16000
    db_threshold: -30.0
    min_speech_duration: 5
    min_silence_duration: 15

vc:
  mock:
    type: mock

separation:
  mock:
    type: mock
