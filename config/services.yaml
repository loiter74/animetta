# Anima 服务配置统一文件
# 所有 ASR、TTS、LLM、VAD 服务的配置

# ===========================
# ASR 语音识别服务
# ===========================

asr:
  # FunASR Paraformer（阿里开源，中文效果最好，推荐）
  funasr:
    type: funasr
    model: paraformer-zh  # paraformer-zh / paraformer-zh-streaming / paraformer-en
    language: zh
    device: cpu  # CUDA 兼容性问题，先用 CPU
    ncpu: 4
    vad_model: fsmn-vad  # VAD 模型，设为 null 禁用
    punc_model: ct-punc  # 标点恢复模型，设为 null 禁用
    spk_model: null  # 说话人识别模型，设为 null 禁用
    hotword: null  # 热词文件路径或字符串
    model_hub: ms  # ms=ModelScope, hf=HuggingFace
    disable_update: true

  # Faster-Whisper（开源免费）
  faster_whisper:
    type: faster_whisper
    model: large-v3  # 完整版模型，中文识别更好
    language: zh
    device: cuda
    compute_type: float16
    download_root: "E:/anima_data/models/whisper"  # 模型存储在 E 盘
    beam_size: 5
    vad_filter: true  # 启用 VAD 过滤静音，提升识别效果
    vad_parameters:
      min_silence_duration_ms: 500
      speech_pad_ms: 30

  # 智谱 GLM ASR
  glm:
    type: glm
    api_key: "${GLM_API_KEY}"
    model: "glm-asr-2512"
    stream: false

  # OpenAI Whisper
  openai:
    type: openai
    api_key: "${OPENAI_API_KEY}"
    model: "whisper-1"

  # Mock（测试用）
  mock:
    type: mock

# ===========================
# TTS 语音合成服务
# ===========================

tts:
  # Edge TTS（微软免费，推荐）
  edge:
    type: edge
    voice: "zh-CN-XiaoxiaoNeural"  # 中文女声
    # 其他: zh-CN-YunxiNeural(男), zh-CN-YunyangNeural(新闻), en-US-JennyNeural(英)

  # Edge TTS - Neuro-sama 风格（电子可爱音）
  edge_neurosama:
    type: edge
    preset: "neurosama"
    voice: "zh-CN-XiaoxiaoNeural"
    rate: "+25%"     # 语速加快 25%
    pitch: "+120Hz"  # 音高升高 120Hz（更明显）

  # Edge TTS - 高音版（手动调节用）
  edge_high:
    type: edge
    voice: "zh-CN-XiaoxiaoNeural"
    rate: "+15%"
    pitch: "+60Hz"

  # Edge TTS - 极速高音版
  edge_extreme:
    type: edge
    voice: "zh-CN-XiaoxiaoNeural"
    rate: "+30%"
    pitch: "+150Hz"

  # 智谱 GLM TTS
  glm:
    type: glm
    api_key: "${GLM_API_KEY}"
    model: "glm-tts"
    voice: "female"  # male / female
    response_format: "wav"
    speed: 1.0
    volume: 1.0

  # OpenAI TTS
  openai:
    type: openai
    api_key: "${OPENAI_API_KEY}"
    model: "tts-1"
    voice: "nova"
    response_format: "mp3"
    speed: 1.0

  # Kokoro TTS - GLaDOS 风格电子合成女声（推荐）
  # 使用 Kokoro-82M 模型 + SoX 音频效果器实现 GLaDOS 风格电子合成感
  # 注意：需安装 kokoro 和 misaki[zh] 依赖: pip install kokoro misaki[zh]
  # 模型首次使用时从 HuggingFace 自动下载（~300MB）
  kokoro_glados:
    type: kokoro
    voice: "zf_xiaobei"           # 中文女声：zf_xiaobei / zf_xiaoni / zf_xiaoxiao / zf_xiaoyi
    # 中文男声：zm_yunjian / zm_yunxi / zm_yunxia / zm_yunyang
    lang_code: "z"                # z=中文, a=美式英语
    device: "cpu"                 # cpu / cuda
    speed: 1.0                    # 语速 0.5-2.0
    model_repo_id: "hexgrad/Kokoro-82M"
    # GLaDOS 电子合成效果器参数
    glados_effect:
      enabled: true
      pitch: -300                 # 音高偏移（负值=更低沉）
      stretch: 1.05               # 语速拉伸（>1=更慢）
      overdrive: 20               # 过载失真强度
      chorus: "0.7 0.9 55 0.4 0.25 2 -t"  # 合唱/电子共振
      bandpass: "300 3"           # 带通滤波（去除温暖感）
      compand: "0.3,1 6:-70,-60,-20 -5 -90 0.2"  # 动态压限
      gain: -3                    # 输出电平

  # ChatTTS（开源对话式语音合成）
  chattts:
    type: chattts
    model_path: "E:/anima_data/models/ChatTTS"  # 模型文件路径
    device: cpu  # cuda / cpu
    compile: false  # Windows 建议关闭
    speaker_seed: 42  # 固定音色，None 则随机
    temperature: 0.3
    top_p: 0.7
    top_k: 20

  # GPT-SoVITS（开源少样本语音克隆 TTS，需本地部署 api_v2.py 服务）
  # 使用前需先启动 GPT-SoVITS 推理服务：
  #   cd GPT-SoVITS && python api_v2.py -a 127.0.0.1 -p 9880 -c GPT_SoVITS/configs/tts_infer.yaml
  # 参考音频（ref_audio_path）为服务端路径，prompt_text 为参考音频的文字转录
  # ⚠️ 已知问题：
  #   - RTX 50系显卡 (Blackwell) 需参考 https://github.com/RVC-Boss/GPT-SoVITS/issues/2192
  #   - GPT-SoVITS V2 模型在并行推理模式(parallel_infer=true)下可能输出为空，建议使用 V2Pro+
  #   - 如 api_v2.py 直调质量不佳，建议先用 webui 验证参考音频和模型效果
  gpt_sovits:
    type: gpt_sovits
    base_url: "http://127.0.0.1:9880"   # GPT-SoVITS api_v2.py 服务地址
    ref_audio_path: ""                   # 参考音频路径（服务端路径，必填）
    prompt_text: ""                      # 参考音频的文字转录（必填）
    prompt_lang: "zh"                    # 参考音频语种：zh/en/ja/ko/yue/auto
    text_lang: "zh"                      # 合成文本语种：zh/en/ja/ko/yue/auto
    top_k: 15                            # Top-k 采样
    top_p: 1.0                           # Top-p 采样
    temperature: 1.0                     # 采样温度
    speed: 1.0                           # 语速 0.5-2.0
    media_type: "wav"                    # 输出格式：wav/ogg/aac/raw
    streaming_mode: false                # 流式模式
    text_split_method: "cut5"            # 文本切分方式（V2 并行推理bug：如有问题尝试 cut0）
    sample_steps: 32                     # 采样步数（V3/V4 模型）
    seed: -1                             # 随机种子（-1 为随机）

  # GPT-SoVITS - Evil 语音模型（Evil 英文原声 + v2ProPlus 跨语种合成）
  # 使用 v2ProPlus 基座模型 + Evil 参考音频做零样本语音克隆
  # aux_ref_audio_paths 可配置辅助参考音频做多说话人音色融合
  gpt_sovits_evil:
    type: gpt_sovits
    base_url: "http://127.0.0.1:9880"
    ref_audio_path: "C:/Users/30262/Project/Anima/config/gpt_sovits/evil/ref_audio.wav"
    prompt_text: "I played Shovel Knight once. It turns out AI doesn't exactly have perfect hand-eye coordination."
    prompt_lang: "en"
    text_lang: "auto"   # auto 自动检测语种（支持中英混合）
    aux_ref_audio_paths:
      - "C:/Users/30262/Project/Anima/config/gpt_sovits/evil/ref_audio_zh.wav"
    top_k: 10
    top_p: 0.8
    temperature: 0.7
    speed: 1.0
    media_type: "wav"
    streaming_mode: false
    text_split_method: "cut5"
    sample_steps: 32
    seed: -1

  # VibeVoice（Microsoft 开源长文本多说话人 TTS，需本地部署模型服务）
  # 推荐部署方式: FastAPI 推理服务监听 localhost:8765，Anima 通过 remote 模式调用
  # RTX 5090D 本地部署参考: openspec/changes/add-vibevoice-tts/design.md
  vibe_voice:
    type: vibe_voice
    mode: remote                 # remote（HTTP API） / local（subprocess）
    base_url: "http://localhost:8765"  # 推理服务地址（remote 模式）
    api_key: ""
    model: "vibe-voice-1.5b"
    voice: "default"
    model_size: "1.5b"           # 1.5b / 7b（local 模式）
    model_path: "E:/anima_data/models/VibeVoice"  # 模型路径（local 模式）
    device: "cuda:0"             # 推理设备（local 模式）
    num_speakers: 1              # 说话人数 1-4
    language: "zh"               # zh / en / mix

  # Qwen3 TTS（通义千问语音合成 - CustomVoice 模型）
  qwen3_custom_voice:
    type: qwen3
    model: "D:/huggingface_cache/hub/models--Qwen--Qwen3-TTS-12Hz-1.7B-CustomVoice/snapshots/0c0e3051f131929182e2c023b9537f8b1c68adfe"
    speaker: "Vivian"
    device: "cuda:0"
    dtype: "float16"
    default_instruct: ""
    language: "Chinese"
    max_new_tokens: 128
    top_p: 0.9
    temperature: 0.9
    repetition_penalty: 1.05
    use_flash_attn: false

  # Qwen3-TTS voice clone (zero-shot voice cloning -- 久远寺有珠 参考音声)
  qwen3_voice_clone:
    type: qwen3
    model: "D:/huggingface_cache/hub/models--Qwen--Qwen3-TTS-12Hz-1.7B-CustomVoice/snapshots/0c0e3051f131929182e2c023b9537f8b1c68adfe"
    speaker: "Vivian"
    device: "cuda:0"
    dtype: "float16"
    default_instruct: ""
    language: "Chinese"
    max_new_tokens: 128
    top_p: 0.9
    temperature: 0.9
    repetition_penalty: 1.05
    use_flash_attn: false
    ref_audio_path: "E:/anima_data/tts_training/kuonji_arisu/training_ready/S_alice_confirmed/FGO_Myroom_01.wav"
    x_vector_only: true

  # Mock（测试用）
  mock:
    type: mock

# ===========================
# LLM 大语言模型服务
# ===========================

llm:
  # 智谱 GLM（推荐)
  glm:
    memory_enabled: true
    llm_config:
      type: glm
      api_key: "${GLM_API_KEY}"
      model: "glm-4-plus"  # 最新旗舰模型，744B 参数，Agent/Coding 能力 SOTA
      enable_thinking: false  # 关闭深度思考模式，加快响应速度

  # DeepSeek（OpenAI API 兼容，推荐替代 GLM）
  deepseek:
    memory_enabled: true
    llm_config:
      type: deepseek
      api_key: "${DEEPSEEK_API_KEY}"
      model: "deepseek-v4-flash"  # deepseek-v4-flash / deepseek-v4-pro
      base_url: "https://api.deepseek.com/v1"
      temperature: 0.7
      max_tokens: 4096

  # OpenAI
  openai:
    memory_enabled: true
    llm_config:
      type: openai
      model: "gpt-4o-mini"  # gpt-4o / gpt-4o-mini / gpt-4-turbo
      api_key: "${OPENAI_API_KEY}"
      temperature: 0.7
      max_tokens: 4096

  # Ollama（本地部署）
  ollama:
    memory_enabled: true
    llm_config:
      type: ollama
      model: "qwen2.5:1.8b"  # qwen2.5:0.5b / qwen2.5:7b / qwen2.5:14b
      base_url: "http://localhost:11434"
      temperature: 0.7
      max_tokens: 4096

  # Local LoRA（本地微调模型）
  local_lora:
    memory_enabled: true
    llm_config:
      type: local_lora
      # 使用本地缓存的 Qwen2.5-7B-Instruct 模型（避免重新下载）
      base_model_name: "E:/anima_data/models/huggingface/models--Qwen--Qwen2.5-7B-Instruct/snapshots/a09a35458c702b33eeacc393d103063234e8bc28"
      # 使用 style_transfer 训练的 LoRA（与 7B 模型兼容）
      lora_path: "E:/anima_data/models/style_transfer/final/lora"
      device: cpu  # cuda / cpu
      temperature: 0.8
      top_p: 0.9

  # Mock（测试用）
  mock:
    memory_enabled: false
    llm_config:
      type: mock

# ===========================
# VAD 语音活动检测
# ===========================

vad:
  silero:
    type: silero
    sample_rate: 16000
    prob_threshold: 0.15   # 原0.5，太高，弱信号触发不了
    db_threshold: -100
    required_hits: 2        # 原6，太多，短音节会漏掉
    required_misses: 16     # 原10，太少，说话中间停顿会被截断
    smoothing_window: 5     # 这个不用动

  # Mock（测试用）
  mock:
    type: mock
    sample_rate: 16000
    db_threshold: -30.0
    min_speech_duration: 5
    min_silence_duration: 15
