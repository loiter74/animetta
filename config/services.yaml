# Anima 服务配置统一文件
# 所有 ASR、TTS、LLM、VAD 服务的配置

# ===========================
# ASR 语音识别服务
# ===========================

asr:
  # FunASR Paraformer（阿里开源，中文效果最好，推荐）
  funasr:
    type: funasr
    model: paraformer-zh  # paraformer-zh / paraformer-zh-streaming / paraformer-en
    language: zh
    device: cpu  # CUDA 兼容性问题，先用 CPU
    ncpu: 4
    vad_model: fsmn-vad  # VAD 模型，设为 null 禁用
    punc_model: ct-punc  # 标点恢复模型，设为 null 禁用
    spk_model: null  # 说话人识别模型，设为 null 禁用
    hotword: null  # 热词文件路径或字符串
    model_hub: ms  # ms=ModelScope, hf=HuggingFace
    disable_update: true

  # Faster-Whisper（开源免费）
  faster_whisper:
    type: faster_whisper
    model: distil-large-v3  # 蒸馏版模型，更快且准确
    language: zh
    device: cuda
    compute_type: float16
    beam_size: 5
    vad_filter: true  # 启用 VAD 过滤静音，提升识别效果
    vad_parameters:
      min_silence_duration_ms: 500
      speech_pad_ms: 30

  # 智谱 GLM ASR
  glm:
    type: glm
    api_key: "${GLM_API_KEY}"
    model: "glm-asr-2512"
    stream: false

  # OpenAI Whisper
  openai:
    type: openai
    api_key: "${OPENAI_API_KEY}"
    model: "whisper-1"

  # Mock（测试用）
  mock:
    type: mock

# ===========================
# TTS 语音合成服务
# ===========================

tts:
  # Edge TTS（微软免费，推荐）
  edge:
    type: edge
    voice: "zh-CN-XiaoxiaoNeural"  # 中文女声
    # 其他: zh-CN-YunxiNeural(男), zh-CN-YunyangNeural(新闻), en-US-JennyNeural(英)

  # 智谱 GLM TTS
  glm:
    type: glm
    api_key: "${GLM_API_KEY}"
    model: "glm-tts"
    voice: "female"  # male / female
    response_format: "wav"
    speed: 1.0
    volume: 1.0

  # OpenAI TTS
  openai:
    type: openai
    api_key: "${OPENAI_API_KEY}"
    model: "tts-1"
    voice: "nova"
    response_format: "mp3"
    speed: 1.0

  # Mock（测试用）
  mock:
    type: mock

# ===========================
# LLM 大语言模型服务
# ===========================

llm:
  # 智谱 GLM（推荐)
  glm:
    memory_enabled: true
    llm_config:
      type: glm
      api_key: "${GLM_API_KEY}"
      model: "glm-4-plus"  # 最新旗舰模型，744B 参数，Agent/Coding 能力 SOTA
      enable_thinking: false  # 关闭深度思考模式，加快响应速度

  # OpenAI
  openai:
    memory_enabled: true
    llm_config:
      type: openai
      model: "gpt-4o-mini"  # gpt-4o / gpt-4o-mini / gpt-4-turbo
      api_key: "${OPENAI_API_KEY}"
      temperature: 0.7
      max_tokens: 4096

  # Ollama（本地部署）
  ollama:
    memory_enabled: true
    llm_config:
      type: ollama
      model: "qwen2.5:1.8b"  # qwen2.5:0.5b / qwen2.5:7b / qwen2.5:14b
      base_url: "http://localhost:11434"
      temperature: 0.7
      max_tokens: 4096

  # Local LoRA（本地微调模型）
  local_lora:
    memory_enabled: true
    llm_config:
      type: local_lora
      # 使用本地缓存的 Qwen2.5-7B-Instruct 模型（避免重新下载）
      base_model_name: "E:/anima_data/models/huggingface/models--Qwen--Qwen2.5-7B-Instruct/snapshots/a09a35458c702b33eeacc393d103063234e8bc28"
      # 使用 style_transfer 训练的 LoRA（与 7B 模型兼容）
      lora_path: "E:/anima_data/models/style_transfer/final/lora"
      device: cuda  # cuda / cpu
      max_new_tokens: 512
      temperature: 0.8
      top_p: 0.9

  # Mock（测试用）
  mock:
    memory_enabled: false
    llm_config:
      type: mock

# ===========================
# VAD 语音活动检测
# ===========================

vad:
  silero:
    type: silero
    sample_rate: 16000
    prob_threshold: 0.15   # 原0.5，太高，弱信号触发不了
    db_threshold: -100
    required_hits: 2        # 原6，太多，短音节会漏掉
    required_misses: 16     # 原10，太少，说话中间停顿会被截断
    smoothing_window: 5     # 这个不用动

  # Mock（测试用）
  mock:
    type: mock
    sample_rate: 16000
    db_threshold: -30.0
    min_speech_duration: 5
    min_silence_duration: 15
