asr:
  funasr:
    type: funasr
    model: paraformer-zh
    language: zh
    device: cpu
    ncpu: 4
    vad_model: fsmn-vad
    punc_model: ct-punc
    spk_model: null
    hotword: null
    model_hub: ms
    disable_update: true
  faster_whisper:
    type: faster_whisper
    model: large-v3
    language: zh
    device: cuda
    compute_type: float16
    download_root: E:/animetta_data/models/whisper
    beam_size: 5
    vad_filter: true
    vad_parameters:
      min_silence_duration_ms: 500
      speech_pad_ms: 30
  openai:
    type: openai
    api_key: ${OPENAI_API_KEY}
    model: whisper-1
  mock:
    type: mock
tts:
  kokoro:
    type: kokoro
    voice: zf_xiaobei
    lang_code: z
    device: cpu
    speed: 1.0
    model_repo_id: hexgrad/Kokoro-82M
  kusajuro_vc:
    type: qwen3
    model: /root/.cache/huggingface/hub/models--Qwen--Qwen3-TTS-12Hz-0.6B-Base/snapshots/5d83992436eae1d760afd27aff78a71d676296fc
    speaker: custom
    device: cuda
    dtype: bfloat16
    language: Chinese
    use_flash_attn: false
    max_new_tokens: 2048
    ref_audio_path: config/personas/voices/kusajuro_ref.wav
    ref_text: ''
    x_vector_only: true
  edge:
    type: edge
    voice: zh-CN-XiaoxiaoNeural
  openai:
    type: openai
    api_key: ${OPENAI_API_KEY}
    model: tts-1
    voice: nova
    response_format: mp3
    speed: 1.0
  kokoro_glados:
    type: kokoro
    voice: zf_xiaobei
    lang_code: z
    device: cpu
    speed: 1.0
    model_repo_id: hexgrad/Kokoro-82M
    glados_effect:
      enabled: true
      pitch: -300
      stretch: 1.05
      overdrive: 20
      chorus: 0.7 0.9 55 0.4 0.25 2 -t
      bandpass: 300 3
      compand: 0.3,1 6:-70,-60,-20 -5 -90 0.2
      gain: -3
  chattts:
    type: chattts
    model_path: E:/animetta_data/models/ChatTTS
    device: cpu
    compile: false
    speaker_seed: 42
    temperature: 0.3
    top_p: 0.7
    top_k: 20
  gpt_sovits:
    type: gpt_sovits
    base_url: http://127.0.0.1:9880
    ref_audio_path: C:/Users/30262/Project/Anima/config/gpt_sovits/evil/ref_audio.wav
    prompt_text: ''
    prompt_lang: zh
    text_lang: zh
    top_k: 15
    top_p: 1.0
    temperature: 1.0
    speed: 1.0
    media_type: wav
    streaming_mode: false
    text_split_method: cut5
    sample_steps: 32
    seed: -1
  gpt_sovits_evil:
    type: gpt_sovits
    base_url: http://127.0.0.1:9880
    ref_audio_path: C:/Users/30262/Project/Anima/config/gpt_sovits/evil/ref_audio.wav
    prompt_text: I played Shovel Knight once. It turns out AI doesn't exactly have
      perfect hand-eye coordination.
    prompt_lang: en
    text_lang: auto
