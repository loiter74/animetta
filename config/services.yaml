llm:
  deepseek:
    memory_enabled: true
    llm_config:
      type: deepseek
      api_key: ${DEEPSEEK_API_KEY}
      model: deepseek-v4-flash
      base_url: https://api.deepseek.com/v1
      temperature: 0.7
      max_tokens: 4096
  openai:
    memory_enabled: true
    llm_config:
      type: openai
      model: gpt-4o-mini
      api_key: ${OPENAI_API_KEY}
      temperature: 0.7
      max_tokens: 4096
  ollama:
    memory_enabled: true
    llm_config:
      type: ollama
      model: qwen2.5:1.8b
      base_url: http://localhost:11434
      temperature: 0.7
      max_tokens: 4096
  local_lora:
    memory_enabled: true
    llm_config:
      type: local_lora
      base_model_name: E:/animetta_data/models/huggingface/models--Qwen--Qwen2.5-7B-Instruct/snapshots/a09a35458c702b33eeacc393d103063234e8bc28
      lora_path: E:/animetta_data/models/style_transfer/final/lora
      device: cpu
      temperature: 0.8
      top_p: 0.9
  mock:
    memory_enabled: false
    llm_config:
      type: mock
vad:
  silero:
    type: silero
    sample_rate: 16000
    prob_threshold: 0.15
    db_threshold: -100
    required_hits: 2
    required_misses: 16
    smoothing_window: 5
  mock:
    type: mock
    sample_rate: 16000
    db_threshold: -30.0
    min_speech_duration: 5
    min_silence_duration: 15
vc:
  rvc:
    type: rvc
    model_path: ${RVC_PATH}/weights/alice.pth
    index_path: ${RVC_PATH}/logs/alice.index
    index_rate: 0.6
    f0_method: rmvpe
    key: 0
    formant: 0
    device: cuda:0
    is_half: true
    rms_mix_rate: 0.5
    protect: 0.33
  mock:
    type: mock
separation:
  demucs:
    type: demucs
    model_type: mel_band_roformer
    config_path: ${DEMUCS_CONFIG_PATH:}
    checkpoint_path: ''
    device: cuda:0
    chunk_size: 131584
    num_overlap: 4
    batch_size: 1
    normalize: true
    is_half: true
    sample_rate: 44100
    instruments:
    - vocals
    - other
    primary_stem: vocals
  mock:
    type: mock
