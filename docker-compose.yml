version: "3.8"

services:
  backend:
    build: .
    ports:
      - "${ANIMETTA_PORT:-12394}:12394"
    environment:
      - ANIMETTA_HOST=0.0.0.0
      - ANIMETTA_PORT=12394
      - ANIMETTA_LOG_LEVEL=${ANIMETTA_LOG_LEVEL:-INFO}
      - GLM_API_KEY=${GLM_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
    volumes:
      - ./memory_db:/app/memory_db
      - ./data:/app/data
      - ./.env:/app/.env:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:12394/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
